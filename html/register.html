<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dang ky | Aqualife</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/register.css" />
  <script defer src="../js/common.js"></script>
  <script defer src="../js/register.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="home.html">Aqualife</a>
      <nav class="main-nav">
        <a href="home.html">Home</a>
        <a href="about.html">About</a>
        <a href="products.html">Products</a>
        <a href="contact.html">Contact</a>
        <a class="active" href="register.html">Register</a>
      </nav>
      <a class="cart-link" href="cart.html">Cart <span class="badge" data-cart-count>0</span></a>
    </div>
  </header>

  <main class="page auth-wrap">
    <div class="container">
      <section class="card auth-card">
        <div class="auth-head">
          <h1>Tao tai khoan moi</h1>
          <p class="muted">Dang ky de quan ly don hang va lich su mua sam.</p>
        </div>

        <form id="register-form" class="grid" style="gap:10px;">
          <input class="input" name="name" type="text" placeholder="Ho va ten" />
          <input class="input" name="email" type="email" placeholder="Email" />
          <input class="input" name="password" type="password" placeholder="Mat khau" />
          <input class="input" name="confirm" type="password" placeholder="Nhap lai mat khau" />
          <button class="btn btn-primary" type="submit">Dang ky</button>
        </form>

        <div id="register-result" class="alert hidden"></div>
        <p class="muted">Da co tai khoan? <a href="auth.html"><strong>Dang nhap</strong></a></p>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-row">
      <span>© 2026 Aqualife</span>
      <a href="index.html">So do trang</a>
    </div>
  </footer>
</body>
</html>
