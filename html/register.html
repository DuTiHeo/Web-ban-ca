<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dang ky | Aqualife</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/auth.css" />
  <script defer src="../js/common.js"></script>
  <script defer src="../js/register.js"></script>
</head>
<body>
  <!-- Video Background -->
  <video autoplay muted loop class="background-video">
    <source src="../video/backgroundVideo.mp4" type="video/mp4">
  </video>
  
  <!-- Overlay for better text readability -->
  <div class="video-overlay"></div>
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="home.html">Aqualife</a>
      <nav class="main-nav">
        <a href="home.html">Trang chủ</a>
        <a href="about.html">Về chúng tôi</a>
        <a href="products.html">Sản phẩm</a>
        <a href="contact.html">Liên hệ</a>
      </nav>
      <nav>
        <a class="cart-link" href="register.html">Đăng ký <img src="../image/icon.img/register.png" alt="Đăng nhập" class="nav-icon"></a>
        <a class="cart-link cart-link--cart" href="cart.html">Giỏ hàng <img src="../image/icon.img/cart.png" alt="Giỏ hàng" class="nav-icon"> <span class="badge" data-cart-count>0</span></a>
      </nav>  
    </div>
  </header>

  <main class="page auth-wrap">
    <div class="container">
      <section class="card auth-card">
        <div class="auth-head">
          <h1>Tạo tài khoản mới</h1>
          <p class="muted">Đăng ký để quản lý đơn hàng và lịch sử mua sắm.</p>
        </div>

        <form id="register-form" class="grid" style="gap:10px;">
          <input class="input" name="name" type="text" placeholder="Họ và tên" />
          <input class="input" name="email" type="email" placeholder="Email" />
          <input class="input" name="password" type="password" placeholder="Mật khẩu" />
          <input class="input" name="confirm" type="password" placeholder="Nhập lại mật khẩu" />
          <button class="btn btn-primary" type="submit">Đăng ký</button>
        </form>

        <div id="register-result" class="alert hidden"></div>
        <p class="muted">Đã có tài khoản? <a href="auth.html"><strong>Đăng nhập</strong></a></p>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-row">
      <span>© 2026 Aqualife</span>
      <a href="index.html">So do trang</a>
    </div>
  </footer>
</body>
</html>
