<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dang nhap | Aqualife</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/auth.css" />
  <script defer src="../js/common.js"></script>
  <script defer src="../js/auth.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="home.html">Aqualife</a>
      <nav class="main-nav">
        <a href="home.html">Home</a>
        <a href="about.html">About</a>
        <a href="products.html">Products</a>
        <a href="contact.html">Contact</a>
      </nav>
      <nav>
        <a class="cart-link" href="auth.html">Login</a>
        <a class="cart-link" href="cart.html">Cart <span class="badge" data-cart-count>0</span></a>
      </nav>
    </div>
  </header>

  <main class="page auth-wrap">
    <div class="container">
      <section class="card auth-card">
        <div class="auth-head">
          <h1>Đăng nhập</h1>
          <p class="muted">Nhập thông tin để truy cập tài khoản.</p>
        </div>

        <form id="auth-form" class="grid" style="gap:10px;">
          <input class="input" name="email" type="email" placeholder="Email" />
          <input class="input" name="password" type="password" placeholder="Mật khẩu" />
          <button class="btn btn-primary" type="submit">Đăng nhập</button>
        </form>

        <div id="auth-result" class="alert hidden"></div>
        <p class="muted">Chưa có tài khoản? <a href="register.html"><strong>Đăng ký</strong></a></p>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-row">
      <span>© 2026 Aqualife</span>
      <a href="index.html">So do trang</a>
    </div>
  </footer>
</body>
</html>
