<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gio hang | Aqualife</title>
  <link rel="stylesheet" href="../css/base.css" />

<body>
  <header class="site-header">

          <button id="checkout" class="btn btn-primary" type="button">Thanh toan</button>

      </div>

  <footer class="site-footer">
