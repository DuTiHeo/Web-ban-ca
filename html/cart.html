<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gio hang | Aqualife</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/cart.css" />
  <script defer src="../js/common.js"></script>
  <script defer src="../js/cart.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="home.html">Aqualife</a>
      <nav class="main-nav">
        <a href="home.html">Home</a>
        <a href="about.html">About</a>
        <a href="products.html">Products</a>
        <a href="contact.html">Contact</a>
        <a href="auth.html">Login</a>
      </nav>
      <a class="cart-link" href="cart.html">Cart <span class="badge" data-cart-count>0</span></a>
    </div>
  </header>

  <main class="page">
    <div class="container">
      <h1>Giỏ hàng của bạn</h1>
      <p class="muted">Ở đây bạn có thể điều chỉnh (Tăng/Giảm) số lượng sản phẩm</p>

      <div id="cart-empty" class="empty hidden">Giỏ hàng đang trống.</div>
      <section id="cart-items" class="cart-list"></section>

      <div class="summary card">
        <a href="products.html" class="quantity"><p>Tiếp tục mua hàng...</p></a>
        <div>
          <p><strong>Tổng thanh toán:</strong> <span class="price" id="cart-total">0đ</span></p>
          <div>
            
          </div>
          <div class="summary-actions">
            <button id="clear-cart" class="btn btn-danger" type="button">Xóa tất cả</button>
            <button id="checkout" class="btn btn-primary" type="button">Thanh toán</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Modal cho thong bao -->
  <div id="custom-modal" class="modal hidden">
    <div class="modal-content">
      <p id="modal-message"></p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn btn-ghost">Hủy</button>
        <button id="modal-confirm" class="btn btn-primary">Xác nhận</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container footer-row">
      <span>© 2026 Aqualife</span>
      <a href="index.html">So do trang</a>
    </div>
  </footer>
</body>
</html>
