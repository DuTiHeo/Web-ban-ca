<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chi tiet san pham | Aqualife</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/product-detail.css" />
  <script defer src="../js/common.js"></script>
  <script defer src="../js/product-detail.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="home.html">Aqualife</a>
      <nav class="main-nav">
        <a href="home.html">Trang chủ</a>
        <a href="about.html">Về chúng tôi</a>
        <a class="active" href="products.html">Sản phẩm</a>
        <a href="contact.html">Liên hệ</a>
      </nav>
      <nav>
        <a class="cart-link" href="auth.html">Đăng nhập <img src="../image/icon.img/auth.png" alt="Đăng nhập" class="nav-icon"></a>
        <a class="cart-link cart-link--cart" href="cart.html">Giỏ hàng <img src="../image/icon.img/cart.png" alt="Giỏ hàng" class="nav-icon"> <span class="badge" data-cart-count>0</span></a>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="container">
      <p><a class="btn btn-ghost" href="products.html">← Quay lại danh sách</a></p>

      <section class="detail">
        <div class="detail-media">
          <img id="detail-image" src="../image/ocean-bg.svg" alt="Sản phẩm" />
        </div>

        <article class="card detail-info">
          <h1 id="detail-name">Đang tải...</h1>
          <p class="price" id="detail-price"></p>
          <p><strong>Loài:</strong> <span id="detail-species"></span></p>
          <p><strong>Môi trường:</strong> <span id="detail-water-type"></span></p>
          <p class="muted" id="detail-description"></p>
          <p><strong>Tồn kho:</strong> <span id="detail-stock"></span></p>

          <div class="inline-form">
            <input id="detail-quantity" class="input" type="number" min="1" value="1" />
            <button id="detail-add" class="btn btn-primary" type="button">Thêm vào giỏ</button>
          </div>
        </article>
      </section>

      <h2 class="related-title">Sản phẩm liên quan</h2>
      <div id="related-products" class="grid grid-3"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-row">
      <span>© 2026 Aqualife</span>
      <a href="index.html">So do trang</a>
    </div>
  </footer>
</body>
</html>
